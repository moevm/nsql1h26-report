<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Вход — АнтиПлагиат</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="bg-light">
<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm" style="width:380px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-check text-primary" style="font-size:3rem"></i>
        <h4 class="mt-2 fw-bold">АнтиПлагиат</h4>
        <p class="text-muted small">Система проверки отчётов</p>
      </div>
      {% if error %}
      <div class="alert alert-danger py-2 small"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Логин</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input name="username" type="text" class="form-control" placeholder="admin или teacher" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Пароль</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input name="password" type="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-2"></i>Войти
        </button>
      </form>
      <div class="mt-4 p-3 bg-light rounded small text-muted">
        <strong>Тестовые аккаунты:</strong><br>
        admin / admin123 — Администратор<br>
        teacher / teacher123 — Преподаватель
      </div>
    </div>
  </div>
</div>
</body>
</html>
