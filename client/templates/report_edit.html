{% extends "base.html" %}
{% block title %}Редактирование отчёта{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-2">
  <a href="/reports/{{ report.id }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h5 class="mb-0 fw-bold"><i class="bi bi-pencil me-2 text-warning"></i>Редактировать отчёт #{{ report.id }}</h5>
</div>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="/reports/{{ report.id }}/edit">
          <div class="mb-3">
            <label class="form-label fw-semibold">Название <span class="text-danger">*</span></label>
            <input name="title" type="text" class="form-control" required value="{{ report.title }}"/>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Автор <span class="text-danger">*</span></label>
              <input name="author" type="text" class="form-control" required value="{{ report.author }}"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Группа <span class="text-danger">*</span></label>
              <input name="group" type="number" class="form-control" required value="{{ report.group }}"/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Предмет <span class="text-danger">*</span></label>
            <input name="subject" type="text" class="form-control" required value="{{ report.subject }}"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Студент</label>
            <select name="student_id" class="form-select">
              <option value="">— Не привязывать —</option>
              {% for s in students %}
              <option value="{{ s.id }}" {% if s.id == current_sid %}selected{% endif %}>{{ s.surname }} {{ s.name }} (гр. {{ s.group }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Комментарий</label>
            <textarea name="comment" class="form-control" rows="2">{{ report.comment or '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning flex-fill text-white">
              <i class="bi bi-save me-1"></i>Сохранить изменения
            </button>
            <a href="/reports/{{ report.id }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
